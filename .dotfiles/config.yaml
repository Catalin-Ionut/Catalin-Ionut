- defaults:
    create:
      mode: 0700
    shell:
      stdout: true
    link:
      force: true
      relink: true
      create: true
    sync:
      create: true

- clean: ['~']

- link:
    ~/:
      glob: true
      path: git/.*

- link:
    ~/:
      glob: true
      path: zsh/.*

- link:
    ~/.config/starship.toml:
      path: starship/starship.toml

- link:
    ~/.claude/agents/:
      glob: true
      path: claude/agents/*
      create: true

- link:
    ~/.claude/skills/:
      glob: true
      path: claude/skills/*
      create: true

- tap:
    - ddev/ddev

- brew:
    - jq
    - gh
    - uv
    - fd
    - bat
    - git
    - fzf
    - lsd
    - mas
    - grc
    - tree
    - ddev
    - glow
    - less
    - wget
    - lnav
    - curl
    - btop
    - mole
    - rsync
    - rclone
    - pandoc
    - ripgrep
    - composer
    - starship
    - topgrade
    - git-crypt
    - iproute2mac

- cask:
    - font-inter
    - font-fira-code
    - font-jetbrains-mono
    - font-hack-nerd-font
    - font-ubuntu-nerd-font
    - font-meslo-lg-nerd-font
    - font-fira-code-nerd-font
    - font-inconsolata-nerd-font
    - font-ubuntu-mono-nerd-font
    - font-roboto-mono-nerd-font
    - font-jetbrains-mono-nerd-font
    - font-dejavu-sans-mono-nerd-font

- cask:
    - iina
    - keka
    - orion
    - shottr
    - deeper
    - alcove
    - spotify
    - discord
    - transmit
    - phpstorm
    - orbstack
    - hiddenbar
    - menuwhere
    - crossover
    - daisydisk
    - macwhisper
    - multitouch
    - maintenance
    - istat-menus
    - copilot-cli
    - claude-code
    - virtualbuddy
    - mac-mouse-fix
    - betterdisplay
    - microsoft-teams
    - openvpn-connect
    - visual-studio-code

- shell:
    - command: git-crypt unlock "$HOME/.config/git-crypt/git-crypt.key"
      quiet: true

- shell:
    - command: shell/settings.sh
      quiet: true
    - command: shell/mas.sh
      quiet: true
    - command: shell/claude.sh
      quiet: true

- conditional:
    if:
      git-decrypted:
        - ssh
    then:
      - sync:
          ~/.ssh:
            path: ssh
            fmode: 600
            dmode: 700
            options: []
            create: true
