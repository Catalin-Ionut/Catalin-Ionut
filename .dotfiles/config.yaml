- shell:
    - command: git-crypt unlock "$HOME/.config/git-crypt/git-crypt.key"
      description: Unlock git-crypt with exported key.

- conditional:
    if:
      git-decrypted:
        - ssh
    then:
      - sync:
          ~/.ssh:
            path: ssh
            fmode: 600
            dmode: 700

- conditional:
    if:
      git-decrypted:
        - etc
    then:
      - sudo:
          sync:
            /etc/hosts: etc/hosts