- defaults:
    sync:
      create: true
    create:
      mode: 0700
    shell:
      quiet: true
    link:
      force: true
      relink: true
      create: true

- clean: ['~']

- create:
    - ~/Sites
    - ~/Developer
    - ~/Applications

- link:
    ~/:
      glob: true
      path: zsh/.*

- link:
    ~/:
      glob: true
      path: git/.*

- link:
    ~/.config/btop:
      glob: true
      path: btop/*
    ~/.config/starship.toml:
      path: starship/starship.toml

- tap:
    - ddev/ddev

