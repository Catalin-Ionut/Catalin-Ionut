- defaults:
    create:
      mode: 0700
    shell:
      quiet: true
    link:
      force: true
      relink: true
      create: true
    sync:
      create: true

- clean: ['~']

- create:
    - ~/Sites
    - ~/Developer
    - ~/Applications

- link:
    ~/:
      glob: true
      path: git/.*

- link:
    ~/:
      glob: true
      path: zsh/.*

- link:
    ~/.config/btop:
      glob: true
      path: btop/*

- link:
    ~/.config/starship.toml:
      path: starship/starship.toml

- tap:
    - ddev/ddev

- brew:
    - jq
    - gh
    - bat
    - git
    - fzf
    - lsd
    - mas
    - grc
    - tree
    - ddev
    - glow
    - less
    - wget
    - lnav
    - btop
    - gnupg
    - rsync
    - rclone
    - pandoc
    - composer
    - starship
    - git-crypt
    - iproute2mac

- cask:
    - font-inter
    - font-fira-code
    - font-jetbrains-mono
    - font-hack-nerd-font
    - font-source-code-pro
    - font-meslo-lg-nerd-font
    - font-fira-code-nerd-font
    - font-jetbrains-mono-nerd-font

- cask:
    - mos
